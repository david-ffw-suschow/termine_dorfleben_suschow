name: Auto Calendar Update

permissions:
  contents: write

on:
  push:
    paths:
      - kalender.xlsx
      - ffw_suschow.ics

  schedule:
    - cron: '0 * * * *'

  workflow_dispatch:

  repository_dispatch:
    types: [delete_event]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo holen
        uses: actions/checkout@v3

      - name: UID setzen
        run: echo "UID_TO_DELETE=${{ github.event.client_payload.uid }}" >> $GITHUB_ENV

      - name: Python installieren
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Abhängigkeiten installieren
        run: pip install pandas openpyxl pytz

      - name: Excel → ICS
        run: python excel_to_ics.py

      - name: ICS fixen
        run: python fix_ics.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ffw_suschow.ics termine_liste.csv
          git diff --cached --quiet || git commit -m "Auto-update calendar"
          git push
